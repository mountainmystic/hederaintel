[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_22"]

[services.hedera-mcp-platform]
startCommand = "node --experimental-sqlite src/server-entry.js"
restartPolicyType = "always"

[services.backup-cron]
startCommand = "node scripts/backup.mjs"
cronSchedule = "0 2 * * *"
